<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Score Final</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Score Final</h2>

  <!-- Nome -->
  <div class="input-group">
    <label for="nome">Nome do Analista:</label>
    <input 
      type="text" 
      id="nome" 
      placeholder="Digite o nome do analista"
      autocomplete="off"
    >
  </div>

  <!-- Testes -->
  <div class="input-group">
    <label for="teste">
      Pontuação das avaliações de teste (0 a 135):
    </label>
    <input 
      type="number" 
      id="teste" 
      min="0" 
      max="135" 
      step="1"
      value="0"
    >
  </div>

  <!-- Final -->
  <div class="input-group">
    <label for="final">
      Pontuação da avaliação final (0 a 50):
    </label>
    <input 
      type="number" 
      id="final" 
      min="0" 
      max="50" 
      step="1"
      value="0"
    >
  </div>

  <!-- Kahoot -->
  <div class="input-group">
    <label for="kahoot">
      Pontuação do Kahoot (0 a 5):
    </label>
    <input 
      type="number" 
      id="kahoot" 
      min="0" 
      max="5" 
      step="1"
      value="0"
    >
  </div>

  <!-- Info -->
  <p class="info">
    Pontuação máxima total: <strong>195 pontos</strong>
  </p>

  <!-- Botão calcular -->
  <div class="botoes-superiores">
    <button id="calcularBtn">Calcular Categoria</button>
  </div>

  <!-- Barra -->
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Resultado -->
  <div id="resultado" class="resultado"></div>

  <!-- Ações -->
  <div class="botoes" id="botoesAcoes" style="display:none;">
    <button id="salvarBtn">Salvar Resultado</button>
    <button id="refazerBtn">Refazer Cálculo</button>
  </div>
</div>

<!-- Biblioteca PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- Script -->
<script src="script.js"></script>

</body>
</html>
